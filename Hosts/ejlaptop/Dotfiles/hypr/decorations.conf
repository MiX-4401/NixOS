source = ~/.config/hypr/Themes/mocha.conf

decoration {
    rounding = 5
    rounding_power = 2.0

    # Change transparency of focused and unfocused windows
    active_opacity = 0.8
    inactive_opacity = 0.7

    dim_modal = true
    border_part_of_window = false

    shadow {
        enabled = true
        range = 10
        render_power = 2
        color = rgba($overlay0Alphaaa)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 4
        ignore_opacity = true

        # noise = 0.1
        contrast = 2.0
        vibrancy = 2.0
        brightness = 0.4
        vibrancy_darkness = 1.0
        new_optimizations = true

        xray = true

        # vibrancy = 0.1696
    }
}
